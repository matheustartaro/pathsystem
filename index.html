<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Projetos JM - Planejador de projetos com gráfico de Gantt para gestão eficiente de cronogramas e tarefas." />
    <meta name="author" content="JM" />
    <meta name="theme-color" content="#a9a198" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Projetos JM" />
    
    <title>Gestão JM</title>
    
    <meta property="og:title" content="Gestão JM" />
    <meta property="og:description" content="Sistema de gestão de projetos com gráfico de Gantt para gestão eficiente de cronogramas e tarefas." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@JM" />
    
    <link href="https://fonts.cdnfonts.com/css/general-sans" rel="stylesheet">
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon-light.png" id="favicon" />
    <link rel="apple-touch-icon" href="/favicon-light.png" />
    
    <script>
      (function() {
        const setFavicon = (isDark) => {
          const favicon = document.getElementById('favicon');
          const appleTouchIcon = document.querySelector('link[rel="apple-touch-icon"]');
          const src = isDark ? '/favicon-dark.png' : '/favicon-light.png';
          if (favicon) favicon.href = src;
          if (appleTouchIcon) appleTouchIcon.href = src;
        };
        
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
        const stored = localStorage.getItem('theme');
        setFavicon(stored === 'dark' || (!stored && prefersDark.matches));
        
        prefersDark.addEventListener('change', (e) => {
          if (!localStorage.getItem('theme')) setFavicon(e.matches);
        });
        
        const observer = new MutationObserver(() => {
          setFavicon(document.documentElement.classList.contains('dark'));
        });
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
